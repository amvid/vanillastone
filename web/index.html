<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Vanillastone</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Shown only on a portrait phone (CSS-gated): nudge to rotate, since the
         game is built for landscape. -->
    <div class="rotate-hint" aria-hidden="true">
      <div class="rotate-hint-inner">
        <span class="rotate-ico">📱</span>
        <p class="rotate-title">Rotate your device</p>
        <p class="rotate-sub">Vanillastone plays best in landscape</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
